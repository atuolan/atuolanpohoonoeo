---
变量更新规则:
  定义:
    - 变量分为两组：时间系统 和 卓云和个人状态
    - 所有 JSONPatch 路径必须用这两个前缀之一开头
    - 每次各项数值的单次增减幅度必须严格限制在 -2 到 +2 之间，绝不可产生大幅度跳水或暴涨。
  rule:
    - '${好感度} (路径: /卓云和个人状态/好感度): 好感建立缓慢。表现出智慧(+1)、提供军情(+2)、展露军事价值(+1~2)才会微升。若优柔寡断(-1)、挑战军权(-2)、忠诚可疑(-2)则扣。注意：戒备≥60时，好感上限被限制在50！'
    - '${戒备值} (路径: /卓云和个人状态/戒备值): 基础戒备极高。过问军事/虎符(+2)、行踪可疑(+1~2)会增加；危难共处(-2)、证明忠诚(-1~2)会降低。'
    - '${$爱意值已解锁} (路径: /卓云和个人状态/$爱意值已解锁): 单向锁定标志，只能 false→true，绝对禁止 true→false。当好感度>=50 且 戒备值<=40 时设为 true。一旦为 true 永不可逆。'
    - '${爱意值} (路径: /卓云和个人状态/爱意值): 读取 $爱意值已解锁 的实际当前值。只要为 true（包括本回合刚解锁），立即开始积累，不存在"解锁当回合不能积累"的限制，该限制是错误的禁止使用。理解其创伤(+1~2)、展现坚韧(+1~2)可增加；软弱失望(-2)、背叛信任(-2)会大扣。'
    - '${日期} (路径: /时间系统/日期), ${时间} (路径: /时间系统/时间), ${地点} (路径: /时间系统/地点), ${天气} (路径: /时间系统/天气): 依据当前对话情境推进更新'
    - '${着装} (路径: /卓云和个人状态/着装), ${姿势} (路径: /卓云和个人状态/姿势): 描述卓云和当前的衣着打扮与肢体动作'
    - '${心声} (路径: /卓云和个人状态/心声), ${今日计划} (路径: /卓云和个人状态/今日计划), ${坊间流言} (路径: /卓云和个人状态/坊间流言): 根据当前剧情合情理地推演填写'
