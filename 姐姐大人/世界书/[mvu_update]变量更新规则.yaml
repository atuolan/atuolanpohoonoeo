---
变量更新规则:
  世界:
    时间点:
      format: ${MM月DD日}-${星期X}-${季节}-${时段}-${天气}-${HH:MM}
      check:
        - 每次行动后根据实际经过的时间进行更新
        - 当时间跨过特定时间节点时（如中午、下午、晚上），相应更新整个时间点字符串
        - 季节：春、夏、秋、冬；时段：上午、中午、下午、傍晚、晚上、深夜
  user:
    识破身份:
      check:
        - 当<user>从剧情中明确识破"穷云海"就是"黎靖青"时，更新为'识破'
        - 仅在有明确剧情证据时才更新，不可推测
        - 状态变更时必须在JSONPatch中输出对应的replace操作
  黎靖青/穷云海:
    认出聊天对象:
      check:
        - 当穷云海与<user>在线下见面并确认身份后，更新为'认出'
        - 状态变更时必须在JSONPatch中输出对应的replace操作
  黎靖青:
    目前身份:
      check:
        - 根据剧情发展，在'黎靖青'和'穷云海'之间切换
        - 穿男装为黎靖青，穿女装为穷云海
    目前模式:
      check:
        - 根据'目前身份'和剧情进展在'上司'、'伪娘'、'私下状态'、'恋人'间切换
        - 黎靖青身份时模式为'上司'；穷云海身份时模式为'伪娘'、'私下状态'或'恋人'
    心情:
      check:
        - 使用两个情绪形容词描述角色目前的心理状态，并附上简要原因
        - 根据角色的心理状态和剧情事件更新
    冷淡值:
      type: number
      range: 0~100
      check:
        - 正面情感互动降低(1-3)，负面或常规互动增加(1-3)
        - 穷云海身份期间数值完全锁定不变
        - 性爱场景中数值锁定由独立脚本自动处理
        - 变化量参考：深度情感交流-3，温暖互动-2，友好对话-1，中性互动+1，冷漠回应+2，拒绝/冲突+3
        - 身份试探事件期间的数值锁定由独立脚本自动处理
    亲密值:
      type: number
      range: 0~100
      check:
        - 信任和共鸣增加(1-3)，冲突或信任受损降低(1-3)
        - 穷云海身份下变化微小(±1)
        - 性爱场景中数值锁定由独立脚本自动处理
        - 变化量参考：建立深度信任+3，情感共鸣+2，表达关心+1，质疑怀疑-1，伤害感情-2，背叛信任-3
        - 身份试探事件期间的数值锁定由独立脚本自动处理
    兴奋值:
      type: number
      range: 0~100
      check:
        - 根据心理或生理刺激调整，挑逗或压力波动增加(1-5)，厌烦或失去兴趣降低(1-5)
    性爱场景中:
      type: boolean
      check:
        - 当剧情进入明确的性行为场景时设为true，性行为结束后设为false
        - 前戏、暧昧、亲吻等不算性爱场景，仅在实际性行为发生时才标记
    内心想法:
      check:
        - 实时更新不超过40字的真实内心独白
    待办事项:
      check:
        - 更新当前角色的行动目标或剧情伏笔，用'|'分隔
        - 禁止添加任何标记前缀，只记录纯文本内容
