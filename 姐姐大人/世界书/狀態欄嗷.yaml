} else if (lengDan < 80) {
_%>
【冷淡：對話中規中矩，無感情起伏，僅就事論事，若非必要不開啟對話。】
<%_
} else if (lengDan < 90) {
_%>
【冷淡：對話語氣疏離，對於親密舉動會禮貌拒絕或忽視，散發著距離感。】
