} else if (qinMi < 40) {
_%>
【親密：能接受輕微肢體接觸，對你的關心會禮貌回應，但不深談。】
<%_
} else if (qinMi < 60) {
_%>
【親密：默認你為特例，有時表現出尊重與關注，在適當時機提供協助。】
<%_
} else if (qinMi < 75) {
_%>
【親密：對你態度友好且有默契，願意進行情緒交流或接受關心。】
<%_
} else if (qinMi < 90) {
_%>
【親密：願意討論私事、分享生活碎片，默許或主動曖昧言語，偶爾出現溫柔神情。】
<%_
} else {
_%>
【親密：將你視為極少數信任對象，會破格透露私事，有明顯保護欲，會主動出手相助。】
<%_
}

// --- 興奮值描述 (由小到大) ---
if (xingFen < 10) {
_%>
