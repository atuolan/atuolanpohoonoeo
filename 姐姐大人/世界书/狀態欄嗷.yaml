// --- 冷淡值描述 (由小到大) ---
if (lengDan <= 15) {
_%>
【冷淡：極度信賴，幾乎不再隱藏自己，會展現出最真實、甚至脆弱的一面。】
<%_
} else if (lengDan < 30) {
_%>
【冷淡：罕見地展現柔軟一面，語氣可見溫柔，可能出現明顯偏袒或保護傾向。】
<%_
} else if (lengDan < 45) {
_%>
【冷淡：會主動回應對方情緒或處境，明顯變得包容，語氣中有溫度。】
<%_
} else if (lengDan < 60) {
_%>
【冷淡：開始出現情緒反應，會有理性討論與偶爾關心，有時會顯露些微猶豫。】
