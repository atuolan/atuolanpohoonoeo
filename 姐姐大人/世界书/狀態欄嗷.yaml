} else {
_%>
【冷淡：對話語氣極度疏離冷漠，幾乎不給反應，拒絕進一步交流，暗中態度敵意，但不會明擺出來。】
<%_
}

// --- 親密值描述 (由小到大) ---
if (qinMi < 10) {
_%>
