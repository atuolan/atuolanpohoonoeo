          方便在输入框指定位置输入引号、括号或自定义内容, 并指定输入后光标位置.

          输入助手会在你所选定的输入框中操作, 如果没有选定, 则会使用酒馆用户输入框.

          配置绑定在脚本上, 因此你甚至可以为不同角色卡单独设置脚本, 从而设置不同的配置.
